<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Hàng Hóa</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
            margin-top:100px;
        }

        .box{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h1{
            color:#0077cc;
        }

        button{
            padding:10px 20px;
            background:#0077cc;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        table,th,td{
            border:1px solid gray;
        }

        th,td{
            padding:10px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h1>Hệ Thống Quản Lý Hàng Hóa</h1>

        <p>Project môn Công nghệ phần mềm</p>

        <button onclick="showMessage()">
            Kiểm Tra Hệ Thống
        </button>

        <table>
            <tr>
                <th>Mã hàng</th>
                <th>Tên hàng</th>
                <th>Số lượng</th>
            </tr>

            <tr>
                <td>HH01</td>
                <td>Bánh</td>
                <td>100</td>
            </tr>

            <tr>
                <td>HH02</td>
                <td>Sữa</td>
                <td>50</td>
            </tr>

        </table>

    </div>

    <script>
        function showMessage(){
            alert("Hệ thống hoạt động thành công!");
        }
    </script>

</body>
</html>
